<!-- CyprusNationalPassportNumberInput component -->
<!--
  Description: an input for entering Cyprus's National Passport Number
  HTML tag: <input>
  CSS class: cyprus-national-passport-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: passports before 13/12/2010 begin with 'E' followed by 6 digits (e.g. E123456); biometric passports issued after 13/12/2010 begin with 'K' followed by 8 digits (e.g. K12345678)
  Usage:
    <input class="cyprus-national-passport-number-input" type="text" aria-label="National Passport Number" autocomplete="off">
-->

<input
  class="cyprus-national-passport-number-input"
  type="text"
  aria-label="National Passport Number"
  autocomplete="off"
>
