<!-- ItaliaCodiceFiscaleView component -->
<!--
  Description: a read-only display of Italy's Codice fiscale (CF)
  HTML tag: <span>
  CSS class: italia-codice-fiscale-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 16 alphanumeric characters: 3 from the surname, 3 from the given name, 5 encoding date of birth and sex, 4 encoding place of birth, and 1 check character
  Usage:
    <span class="italia-codice-fiscale-view" aria-label="Italian Fiscal Code">value-here</span>
-->

<span
  class="italia-codice-fiscale-view"
  aria-label="Italian Fiscal Code"
></span>
