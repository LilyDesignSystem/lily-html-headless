<!-- TileMap component -->
<!--
  Description: a tile cartogram map
  HTML tag: <div>
  CSS class: tile-map
  Keyboard: None (passive element)
  Accessibility: role="img", aria-label for accessible name
-->

<div
  class="tile-map"
  role="img"
  aria-label=""
  aria-roledescription="tile map"
>
  <!-- Consumer provides [data-tile] elements; consumer JS handles arrow-key navigation -->
</div>
