<!-- IslandKennitalaInput component -->
<!--
  Description: an input for entering Iceland's Kennitala
  HTML tag: <input>
  CSS class: island-kennitala-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits where the first 6 are the date of birth (DDMMYY)
  Usage:
    <input class="island-kennitala-input" type="text" aria-label="Personal Identity Code" autocomplete="off">
-->

<input
  class="island-kennitala-input"
  type="text"
  aria-label="Personal Identity Code"
  autocomplete="off"
>
