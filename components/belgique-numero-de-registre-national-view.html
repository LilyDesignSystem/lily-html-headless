<!-- BelgiqueNumeroDeRegistreNationalView component -->
<!--
  Description: a read-only display of Belgium's Numéro de Registre National / Rijksregisternummer (NRN)
  HTML tag: <span>
  CSS class: belgique-numero-de-registre-national-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 digits where the first 6 are the date of birth (YYMMDD), the next 3 are an ordering number (uneven for men, even for women) and the last 2 a check digit
  Usage:
    <span class="belgique-numero-de-registre-national-view" aria-label="National Register Number">value-here</span>
-->

<span
  class="belgique-numero-de-registre-national-view"
  aria-label="National Register Number"
></span>
