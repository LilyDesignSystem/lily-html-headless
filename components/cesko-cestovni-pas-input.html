<!-- CeskoCestovniPasInput component -->
<!--
  Description: an input for entering Czech Republic's Cestovní pas
  HTML tag: <input>
  CSS class: cesko-cestovni-pas-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: usually 8 digits, sometimes longer, issued by the Ministry of the Interior
  Usage:
    <input class="cesko-cestovni-pas-input" type="text" aria-label="Czech Passport" autocomplete="off">
-->

<input
  class="cesko-cestovni-pas-input"
  type="text"
  aria-label="Czech Passport"
  autocomplete="off"
>
