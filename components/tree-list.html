<!-- TreeList component -->
<!--
  Description: a hierarchical list with nested expandable items
  HTML tag: <ol>
  CSS class: tree-list
  Keyboard: None (passive element)
  Accessibility: role="tree", aria-label for accessible name
  Usage:
    <ol class="tree-list" role="tree" aria-label="Example">
      ...
    </ol>
-->

<ol
  class="tree-list"
  role="tree"
  aria-label=""
>
  <!-- Consumer provides list items -->
</ol>
