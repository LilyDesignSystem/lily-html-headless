<!-- hero-headline.html -->
<!-- HeroHeadline component -->
<!--
  Description: a full-bleed hero section with headline overlaid on media
  HTML tag: <div>
  CSS class: hero-headline
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="hero-headline"
  aria-label=""
>
  <div class="hero-headline-media">
    <!-- Consumer provides background media -->
  </div>
  <div class="hero-headline-content">
    <!-- Consumer provides headline content -->
  </div>
</div>
