<!-- LiechtensteinPassportNumberInput component -->
<!--
  Description: an input for entering Liechtenstein's Liechtenstein Passport Number
  HTML tag: <input>
  CSS class: liechtenstein-passport-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 1 letter followed by 5 digits (e.g. R00536)
  Usage:
    <input class="liechtenstein-passport-number-input" type="text" aria-label="Liechtenstein Passport Number" autocomplete="off">
-->

<input
  class="liechtenstein-passport-number-input"
  type="text"
  aria-label="Liechtenstein Passport Number"
  autocomplete="off"
>
