<!-- RomaniaPasaportView component -->
<!--
  Description: a read-only display of Romania's Paşaport
  HTML tag: <span>
  CSS class: romania-pasaport-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 8 characters: positions 1-2 [A-Z] and positions 3-8 [0-9]
  Usage:
    <span class="romania-pasaport-view" aria-label="Romanian Passport">value-here</span>
-->

<span
  class="romania-pasaport-view"
  aria-label="Romanian Passport"
></span>
