<!-- EestiIsikukoodView component -->
<!--
  Description: a read-only display of Estonia's Isikukood (IK)
  HTML tag: <span>
  CSS class: eesti-isikukood-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 digits in the form GYYMMDDSSSC: G is sex and century (odd male, even female; 1-2 19th c., 3-4 20th c., 5-6 21st c.), SSS distinguishes persons born the same day, C is a checksum
  Usage:
    <span class="eesti-isikukood-view" aria-label="Personal Identification Code">value-here</span>
-->

<span
  class="eesti-isikukood-view"
  aria-label="Personal Identification Code"
></span>
