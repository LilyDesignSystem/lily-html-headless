<!-- headline.html -->
<!-- Headline component -->
<!--
  Description: a page headline
  HTML tag: <div>
  CSS class: headline
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="headline"
  aria-label=""
>
  <h1 class="headline-heading">
    <!-- Consumer provides heading text -->
  </h1>
  <div class="headline-subtitle">
    <!-- Consumer provides subtitle -->
  </div>
  <div class="headline-byline">
    <!-- Consumer provides byline -->
  </div>
</div>
