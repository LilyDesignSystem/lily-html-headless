<!-- video-player.html -->
<!-- VideoPlayer component -->
<!--
  Description: a video player container
  HTML tag: <div>
  CSS class: video-player
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="video-player"
  aria-label=""
>
  <video class="video-player-element" src="" controls playsinline></video>
  <figcaption class="video-player-caption">
    <!-- Consumer provides caption -->
  </figcaption>
</div>
