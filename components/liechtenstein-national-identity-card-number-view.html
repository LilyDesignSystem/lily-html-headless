<!-- LiechtensteinNationalIdentityCardNumberView component -->
<!--
  Description: a read-only display of Liechtenstein's Liechtenstein National Identity Card Number
  HTML tag: <span>
  CSS class: liechtenstein-national-identity-card-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 2 letters followed by 8 digits (e.g. ID022143586); changes with each renewed card
  Usage:
    <span class="liechtenstein-national-identity-card-number-view" aria-label="Liechtenstein National Identity Card Number">value-here</span>
-->

<span
  class="liechtenstein-national-identity-card-number-view"
  aria-label="Liechtenstein National Identity Card Number"
></span>
