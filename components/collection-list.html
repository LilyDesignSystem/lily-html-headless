<!-- collection-list.html -->
<!-- CollectionList component -->
<!--
  Description: a compact list of multiple related items such as articles or events

  HTML tag: <ul>
  CSS class: collection-list
  Keyboard: None (passive list; inner links are focusable as usual)
  Accessibility: The native <ul> conveys list semantics. An optional aria-label provides an accessible name for the collection.

  Usage:
    <ul class="collection-list" aria-label="Recent articles">
      <li class="collection-list-item">…</li>
      <li class="collection-list-item">…</li>
    </ul>
-->

<ul
  class="collection-list"
  aria-label=""
>
  <!-- Consumer provides <li class="collection-list-item"> children -->
</ul>
