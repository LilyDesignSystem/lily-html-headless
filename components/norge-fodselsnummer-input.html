<!-- NorgeFodselsnummerInput component -->
<!--
  Description: an input for entering Norway's Fødselsnummer
  HTML tag: <input>
  CSS class: norge-fodselsnummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits where the first 6 represent the date of birth (DDMMYY)
  Usage:
    <input class="norge-fodselsnummer-input" type="text" aria-label="Norwegian Birth Number" autocomplete="off">
-->

<input
  class="norge-fodselsnummer-input"
  type="text"
  aria-label="Norwegian Birth Number"
  autocomplete="off"
>
