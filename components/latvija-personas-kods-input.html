<!-- LatvijaPersonasKodsInput component -->
<!--
  Description: an input for entering Latvia's Personas kods
  HTML tag: <input>
  CSS class: latvija-personas-kods-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits in the form DDMMYY-CZZZZ where the first 6 are the date of birth (DDMMYY) and C encodes the century (0 = 19th, 1 = 20th, 2 = 21st)
  Usage:
    <input class="latvija-personas-kods-input" type="text" aria-label="Personal Code" autocomplete="off">
-->

<input
  class="latvija-personas-kods-input"
  type="text"
  aria-label="Personal Code"
  autocomplete="off"
>
