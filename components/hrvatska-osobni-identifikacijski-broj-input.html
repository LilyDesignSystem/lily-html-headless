<!-- HrvatskaOsobniIdentifikacijskiBrojInput component -->
<!--
  Description: an input for entering Croatia's Osobni identifikacijski broj (OIB)
  HTML tag: <input>
  CSS class: hrvatska-osobni-identifikacijski-broj-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits — 10 random digits plus a check digit; permanent, unique, and assigned to every Croatian citizen and legal person
  Usage:
    <input class="hrvatska-osobni-identifikacijski-broj-input" type="text" aria-label="Personal Identification Number" autocomplete="off">
-->

<input
  class="hrvatska-osobni-identifikacijski-broj-input"
  type="text"
  aria-label="Personal Identification Number"
  autocomplete="off"
>
