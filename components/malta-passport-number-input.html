<!-- MaltaPassportNumberInput component -->
<!--
  Description: an input for entering Malta's Malta Passport Number
  HTML tag: <input>
  CSS class: malta-passport-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 7 numerical digits issued by the Civil Registration Directorate
  Usage:
    <input class="malta-passport-number-input" type="text" aria-label="Malta Passport Number" autocomplete="off">
-->

<input
  class="malta-passport-number-input"
  type="text"
  aria-label="Malta Passport Number"
  autocomplete="off"
>
