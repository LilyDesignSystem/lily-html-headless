<!-- EnglandNationalHealthServiceNumberInput component -->
<!--
  Description: an input for entering England's National Health Service Number (NHS)
  HTML tag: <input>
  CSS class: england-national-health-service-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits in 3-3-4 format with a Modulus-11 check digit, allocated through the Personal Demographics Service
  Usage:
    <input class="england-national-health-service-number-input" type="text" aria-label="National Health Service Number" autocomplete="off">
-->

<input
  class="england-national-health-service-number-input"
  type="text"
  aria-label="National Health Service Number"
  autocomplete="off"
>
