<!-- DateTimeLocalInput component -->
<!--
  Description: an input for entering a date and time without time zone
  HTML tag: <input>
  CSS class: date-time-local-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="date-time-local-input" aria-label="Example">
      ...
    
-->

<input
  class="date-time-local-input"
  type="datetime-local"
  aria-label=""
>
