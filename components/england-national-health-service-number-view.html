<!-- EnglandNationalHealthServiceNumberView component -->
<!--
  Description: a read-only display of England's National Health Service Number (NHS)
  HTML tag: <span>
  CSS class: england-national-health-service-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits in 3-3-4 format with a Modulus-11 check digit, allocated through the Personal Demographics Service
  Usage:
    <span class="england-national-health-service-number-view" aria-label="National Health Service Number">value-here</span>
-->

<span
  class="england-national-health-service-number-view"
  aria-label="National Health Service Number"
></span>
