<!-- AlbaCommunityHealthIndexInput component -->
<!--
  Description: an input for entering Scotland's Community Health Index (CHI)
  HTML tag: <input>
  CSS class: alba-community-health-index-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits encoding date of birth (DDMMYY) + two random digits + a sex digit (odd male, even female) + a Modulus-11 check digit
  Usage:
    <input class="alba-community-health-index-input" type="text" aria-label="Community Health Index" autocomplete="off">
-->

<input
  class="alba-community-health-index-input"
  type="text"
  aria-label="Community Health Index"
  autocomplete="off"
>
