<!-- NederlandPaspoortNummerInput component -->
<!--
  Description: an input for entering Netherlands's Paspoort Nummer
  HTML tag: <input>
  CSS class: nederland-paspoort-nummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9 characters: positions 1-2 [A-Z] except 'O', positions 3-8 [A-Z 0-9] except 'O', position 9 [0-9]
  Usage:
    <input class="nederland-paspoort-nummer-input" type="text" aria-label="Dutch Passport Number" autocomplete="off">
-->

<input
  class="nederland-paspoort-nummer-input"
  type="text"
  aria-label="Dutch Passport Number"
  autocomplete="off"
>
