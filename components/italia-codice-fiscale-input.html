<!-- ItaliaCodiceFiscaleInput component -->
<!--
  Description: an input for entering Italy's Codice fiscale (CF)
  HTML tag: <input>
  CSS class: italia-codice-fiscale-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 16 alphanumeric characters: 3 from the surname, 3 from the given name, 5 encoding date of birth and sex, 4 encoding place of birth, and 1 check character
  Usage:
    <input class="italia-codice-fiscale-input" type="text" aria-label="Italian Fiscal Code" autocomplete="off">
-->

<input
  class="italia-codice-fiscale-input"
  type="text"
  aria-label="Italian Fiscal Code"
  autocomplete="off"
>
