<!-- scroller.html -->
<!-- Scroller component -->
<!--
  Description: a scrollytelling container
  HTML tag: <div>
  CSS class: scroller
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="scroller"
  aria-label=""
  data-offset="0.5"
>
  <div class="scroller-background" aria-live="polite">
    <!-- Consumer provides sticky background -->
  </div>
  <div class="scroller-foreground scroller-base" data-offset="0.5">
    <!-- Consumer provides step children -->
  </div>
</div>
