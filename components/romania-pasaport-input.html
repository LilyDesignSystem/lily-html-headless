<!-- RomaniaPasaportInput component -->
<!--
  Description: an input for entering Romania's Paşaport
  HTML tag: <input>
  CSS class: romania-pasaport-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 8 characters: positions 1-2 [A-Z] and positions 3-8 [0-9]
  Usage:
    <input class="romania-pasaport-input" type="text" aria-label="Romanian Passport" autocomplete="off">
-->

<input
  class="romania-pasaport-input"
  type="text"
  aria-label="Romanian Passport"
  autocomplete="off"
>
