<!-- SlovenskoRodneCisloInput component -->
<!--
  Description: an input for entering Slovakia's Rodné číslo (RČ)
  HTML tag: <input>
  CSS class: slovensko-rodne-cislo-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits in the form YYMMDDCCCX where MM is 01-12 for males and 51-62 for females; X is a check digit and the whole number is divisible by 11
  Usage:
    <input class="slovensko-rodne-cislo-input" type="text" aria-label="Slovak Personal Number" autocomplete="off">
-->

<input
  class="slovensko-rodne-cislo-input"
  type="text"
  aria-label="Slovak Personal Number"
  autocomplete="off"
>
