<!-- CeskoCestovniPasView component -->
<!--
  Description: a read-only display of Czech Republic's Cestovní pas
  HTML tag: <span>
  CSS class: cesko-cestovni-pas-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: usually 8 digits, sometimes longer, issued by the Ministry of the Interior
  Usage:
    <span class="cesko-cestovni-pas-view" aria-label="Czech Passport">value-here</span>
-->

<span
  class="cesko-cestovni-pas-view"
  aria-label="Czech Passport"
></span>
