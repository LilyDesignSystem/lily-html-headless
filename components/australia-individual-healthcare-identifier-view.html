<!-- AustraliaIndividualHealthcareIdentifierView component -->
<!--
  Description: a read-only display of Australia's Individual Healthcare Identifier (IHI)
  HTML tag: <span>
  CSS class: australia-individual-healthcare-identifier-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 16 digits assigned by the Healthcare Identifiers Service
  Usage:
    <span class="australia-individual-healthcare-identifier-view" aria-label="Individual Healthcare Identifier">value-here</span>
-->

<span
  class="australia-individual-healthcare-identifier-view"
  aria-label="Individual Healthcare Identifier"
></span>
