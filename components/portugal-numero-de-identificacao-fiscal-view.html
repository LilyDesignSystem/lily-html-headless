<!-- PortugalNumeroDeIdentificacaoFiscalView component -->
<!--
  Description: a read-only display of Portugal's Número de Identificação Fiscal (NIF)
  HTML tag: <span>
  CSS class: portugal-numero-de-identificacao-fiscal-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9 digits; the leading digit(s) encode the kind of taxpayer (1-3 personal, 45 non-resident citizen, 5 legal person, etc.)
  Usage:
    <span class="portugal-numero-de-identificacao-fiscal-view" aria-label="Tax Identification Number">value-here</span>
-->

<span
  class="portugal-numero-de-identificacao-fiscal-view"
  aria-label="Tax Identification Number"
></span>
