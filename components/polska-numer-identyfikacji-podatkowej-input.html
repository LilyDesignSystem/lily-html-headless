<!-- PolskaNumerIdentyfikacjiPodatkowejInput component -->

  Description: an input for entering Poland's Numer Identyfikacji Podatkowej (NIP)
  HTML tag: <input>
  CSS class: polska-numer-identyfikacji-podatkowej-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name

  Usage:
    <input class="polska-numer-identyfikacji-podatkowej-input" type="text" aria-label="Tax Identification Number" autocomplete="off">
-->

  autocomplete="off"
>
