<!-- SverigePersonnummerView component -->
<!--
  Description: a read-only display of Sweden's Personnummer
  HTML tag: <span>
  CSS class: sverige-personnummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 12 digits in the format CCYYMMDDZZZQ: CCYYMMDD is the date of birth, ZZZ a serial (odd male, even female), and Q a Luhn check digit
  Usage:
    <span class="sverige-personnummer-view" aria-label="Personal Identity Number">value-here</span>
-->

<span
  class="sverige-personnummer-view"
  aria-label="Personal Identity Number"
></span>
