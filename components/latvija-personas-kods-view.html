<!-- LatvijaPersonasKodsView component -->
<!--
  Description: a read-only display of Latvia's Personas kods
  HTML tag: <span>
  CSS class: latvija-personas-kods-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 digits in the form DDMMYY-CZZZZ where the first 6 are the date of birth (DDMMYY) and C encodes the century (0 = 19th, 1 = 20th, 2 = 21st)
  Usage:
    <span class="latvija-personas-kods-view" aria-label="Personal Code">value-here</span>
-->

<span
  class="latvija-personas-kods-view"
  aria-label="Personal Code"
></span>
