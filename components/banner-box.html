<!-- BannerBox component -->
<!--
  Description: a banner box that is inside a banner component, using flexbox horizontal

  Attributes:
    class — CSS class name(s) provided by consumer
    aria-label — optional accessible name

  Usage:
    <div class="banner" role="banner" aria-label="Announcement">
      <div class="banner-box">
        <span>Message text</span>
        <button>Action</button>
      </div>
    </div>

  Notes:
    - Consumer applies flexbox styles: display: flex; flex-direction: row;
    - Intended to be placed inside a Banner component
-->

<div
  class="banner-box"
>
  <!-- Consumer provides content -->
</div>
