<!-- theme-provider.html -->
<!-- ThemeProvider component -->
<!--
  Description: a container applying theme CSS custom properties
  HTML tag: <div>
  CSS class: theme-provider
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="theme-provider"
  aria-label=""
  data-theme="light"
  style="display: contents;"
>
  <!-- Consumer provides content -->
</div>
