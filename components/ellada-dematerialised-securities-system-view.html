<!-- ElladaDematerialisedSecuritiesSystemView component -->
<!--
  Description: a read-only display of Greece's Dematerialised Securities System (DSS)
  HTML tag: <span>
  CSS class: ellada-dematerialised-securities-system-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits linked to the investor's personal details (name, ID number, passport number, tax registration number) and managed by the Central Securities Depository of Greece
  Usage:
    <span class="ellada-dematerialised-securities-system-view" aria-label="Dematerialised Securities System">value-here</span>
-->

<span
  class="ellada-dematerialised-securities-system-view"
  aria-label="Dematerialised Securities System"
></span>
