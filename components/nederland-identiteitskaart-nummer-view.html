<!-- NederlandIdentiteitskaartNummerView component -->
<!--
  Description: a read-only display of Netherlands's Identiteitskaart Nummer
  HTML tag: <span>
  CSS class: nederland-identiteitskaart-nummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9 characters following the same format as the passport number; 'O' is disallowed but '0' is permitted
  Usage:
    <span class="nederland-identiteitskaart-nummer-view" aria-label="Dutch National Identity Card Number">value-here</span>
-->

<span
  class="nederland-identiteitskaart-nummer-view"
  aria-label="Dutch National Identity Card Number"
></span>
