<!-- NorgeFodselsnummerView component -->
<!--
  Description: a read-only display of Norway's Fødselsnummer
  HTML tag: <span>
  CSS class: norge-fodselsnummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 digits where the first 6 represent the date of birth (DDMMYY)
  Usage:
    <span class="norge-fodselsnummer-view" aria-label="Norwegian Birth Number">value-here</span>
-->

<span
  class="norge-fodselsnummer-view"
  aria-label="Norwegian Birth Number"
></span>
