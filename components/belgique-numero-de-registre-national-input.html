<!-- BelgiqueNumeroDeRegistreNationalInput component -->
<!--
  Description: an input for entering Belgium's Numéro de Registre National / Rijksregisternummer (NRN)
  HTML tag: <input>
  CSS class: belgique-numero-de-registre-national-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits where the first 6 are the date of birth (YYMMDD), the next 3 are an ordering number (uneven for men, even for women) and the last 2 a check digit
  Usage:
    <input class="belgique-numero-de-registre-national-input" type="text" aria-label="National Register Number" autocomplete="off">
-->

<input
  class="belgique-numero-de-registre-national-input"
  type="text"
  aria-label="National Register Number"
  autocomplete="off"
>
