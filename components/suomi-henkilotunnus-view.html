<!-- SuomiHenkilotunnusView component -->
<!--
  Description: a read-only display of Finland's Henkilötunnus (HETU)
  HTML tag: <span>
  CSS class: suomi-henkilotunnus-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 characters in the format DDMMYYCZZZQ: DDMMYY is the date of birth, C is the century sign (+, -, or A), ZZZ is an individual number (odd male, even female), Q is the checksum
  Usage:
    <span class="suomi-henkilotunnus-view" aria-label="Personal Identity Code">value-here</span>
-->

<span
  class="suomi-henkilotunnus-view"
  aria-label="Personal Identity Code"
></span>
