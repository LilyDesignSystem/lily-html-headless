<!-- EspanaCodigoDeIdentificacionFiscalView component -->
<!--
  Description: a read-only display of Spain's Código de Identificación Fiscal (CIF)
  HTML tag: <span>
  CSS class: espana-codigo-de-identificacion-fiscal-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9 characters: 8 numbers and a control letter (the letters I, Ñ, O, and U are not used)
  Usage:
    <span class="espana-codigo-de-identificacion-fiscal-view" aria-label="Tax Identification Code">value-here</span>
-->

<span
  class="espana-codigo-de-identificacion-fiscal-view"
  aria-label="Tax Identification Code"
></span>
