<!-- slovenija-emso-input.html -->
<!-- SlovenijaEmsoInput component -->
<!--
  Description: an input for entering Slovenia's Enotna Matična Številka Občana (EMŠO)
  HTML tag: <input>
  CSS class: slovenija-emso-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 13 digits: the first 7 are the date of birth (DDMMYYY), digits 8-9 the register, 10-12 a sex-and-serial component (000-499 male, 500-999 female), 13 a check digit
  Usage:
    <input class="slovenija-emso-input" type="text" aria-label="Unique Master Citizen Number" autocomplete="off">
-->

<input
  class="slovenija-emso-input"
  type="text"
  aria-label="Unique Master Citizen Number"
  autocomplete="off"
>
