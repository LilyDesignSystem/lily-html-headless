<!-- RomaniaCodNumericPersonalInput component -->
<!--
  Description: an input for entering Romania's Cod Numeric Personal (CNP)
  HTML tag: <input>
  CSS class: romania-cod-numeric-personal-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 13 digits: gender and century (1/3/5/7 male; 2/4/6/8 female; 9 foreigner), date of birth (YYMMDD), country zone (01-52, or 99 for Bucharest sectors), serial (3 digits), and a Modulus-11 checksum digit
  Usage:
    <input class="romania-cod-numeric-personal-input" type="text" aria-label="Personal Numerical Code" autocomplete="off">
-->

<input
  class="romania-cod-numeric-personal-input"
  type="text"
  aria-label="Personal Numerical Code"
  autocomplete="off"
>
