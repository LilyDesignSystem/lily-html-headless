<!-- masonry.html -->
<!-- Masonry component -->
<!--
  Description: a masonry layout container for variable-height items using CSS multi-column flow

  HTML tag: <div>
  CSS class: masonry
  Keyboard: None (passive layout container)
  Accessibility: None — purely structural layout container

  Behavior:
    Uses the CSS multi-column approach: column-count and column-gap.
    Children flow vertically through each column. Consumers should apply
    "break-inside: avoid" to direct children so items do not break across columns.
    The data-columns attribute is exposed for consumer CSS hooks.

  Usage:
    <div class="masonry" data-columns="3"
         style="column-count: 3; column-gap: 1rem;">
      <div style="break-inside: avoid;">...</div>
      <div style="break-inside: avoid;">...</div>
      <div style="break-inside: avoid;">...</div>
    </div>
-->

<div
  class="masonry"
  data-columns="3"
  style="column-count: 3; column-gap: 1rem;"
>
  <!-- Consumer provides masonry items; each item should have break-inside: avoid -->
</div>
