<!-- TreeListItem component -->
<!--
  Description: one item in a tree navigation list
  HTML tag: <li> wrapped in <ol>
  CSS class: tree-list-item
  Accessibility: aria-label for accessible name
-->

<ol role="tree"><li class="tree-list-item" role="treeitem" aria-label="Example">
    <!-- Consumer provides child content -->
</li></ol>
