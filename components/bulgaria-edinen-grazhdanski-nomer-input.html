<!-- BulgariaEdinenGrazhdanskiNomerInput component -->
<!--
  Description: an input for entering Bulgaria's Единен граждански номер / Edinen grazhdanski nomer (EGN)
  HTML tag: <input>
  CSS class: bulgaria-edinen-grazhdanski-nomer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits: the first 6 are the date of birth (YYMMDD), the next 3 encode area and birth order (ninth digit even for boy, odd for girl), and the tenth is a check digit
  Usage:
    <input class="bulgaria-edinen-grazhdanski-nomer-input" type="text" aria-label="Uniform Civil Number" autocomplete="off">
-->

<input
  class="bulgaria-edinen-grazhdanski-nomer-input"
  type="text"
  aria-label="Uniform Civil Number"
  autocomplete="off"
>
