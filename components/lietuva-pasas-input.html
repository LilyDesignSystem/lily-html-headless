<!-- LietuvaPasasInput component -->
<!--
  Description: an input for entering Lithuania's Pasas
  HTML tag: <input>
  CSS class: lietuva-pasas-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 8-digit passport or identity card number
  Usage:
    <input class="lietuva-pasas-input" type="text" aria-label="Lithuanian Passport" autocomplete="off">
-->

<input
  class="lietuva-pasas-input"
  type="text"
  aria-label="Lithuanian Passport"
  autocomplete="off"
>
