<!-- DanmarkPersonnummerInput component -->
<!--
  Description: an input for entering Denmark's Personnummer (CPR-nummer) (CPR)
  HTML tag: <input>
  CSS class: danmark-personnummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits in the format DDMMYYXXXX where the first 6 are the date of birth (DDMMYY)
  Usage:
    <input class="danmark-personnummer-input" type="text" aria-label="Personal Identity Code" autocomplete="off">
-->

<input
  class="danmark-personnummer-input"
  type="text"
  aria-label="Personal Identity Code"
  autocomplete="off"
>
