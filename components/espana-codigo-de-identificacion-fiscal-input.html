<!-- EspanaCodigoDeIdentificacionFiscalInput component -->
<!--
  Description: an input for entering Spain's Código de Identificación Fiscal (CIF)
  HTML tag: <input>
  CSS class: espana-codigo-de-identificacion-fiscal-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9 characters: 8 numbers and a control letter (the letters I, Ñ, O, and U are not used)
  Usage:
    <input class="espana-codigo-de-identificacion-fiscal-input" type="text" aria-label="Tax Identification Code" autocomplete="off">
-->

<input
  class="espana-codigo-de-identificacion-fiscal-input"
  type="text"
  aria-label="Tax Identification Code"
  autocomplete="off"
>
