<!-- eesti-isikukood-input.html -->
<!-- EestiIsikukoodInput component -->
<!--
  Description: an input for entering Estonia's Isikukood (IK)
  HTML tag: <input>
  CSS class: eesti-isikukood-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits in the form GYYMMDDSSSC: G is sex and century (odd male, even female; 1-2 19th c., 3-4 20th c., 5-6 21st c.), SSS distinguishes persons born the same day, C is a checksum
  Usage:
    <input class="eesti-isikukood-input" type="text" aria-label="Personal Identification Code" autocomplete="off">
-->

<input
  class="eesti-isikukood-input"
  type="text"
  aria-label="Personal Identification Code"
  autocomplete="off"
>
