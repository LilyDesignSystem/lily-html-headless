<!-- slovensko-pas-view.html -->
<!-- SlovenskoPasView component -->
<!--
  Description: a read-only display of Slovakia's Pas
  HTML tag: <span>
  CSS class: slovensko-pas-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9 characters in the format XXNNNNNNN: 2 block letters and 7 digits; valid for 10 years
  Usage:
    <span class="slovensko-pas-view" aria-label="Slovak Passport">value-here</span>
-->

<span
  class="slovensko-pas-view"
  aria-label="Slovak Passport"
></span>
