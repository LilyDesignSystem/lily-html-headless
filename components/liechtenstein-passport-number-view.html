<!-- LiechtensteinPassportNumberView component -->
<!--
  Description: a read-only display of Liechtenstein's Liechtenstein Passport Number
  HTML tag: <span>
  CSS class: liechtenstein-passport-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 1 letter followed by 5 digits (e.g. R00536)
  Usage:
    <span class="liechtenstein-passport-number-view" aria-label="Liechtenstein Passport Number">value-here</span>
-->

<span
  class="liechtenstein-passport-number-view"
  aria-label="Liechtenstein Passport Number"
></span>
