<!-- slovensko-pas-input.html -->
<!-- SlovenskoPasInput component -->
<!--
  Description: an input for entering Slovakia's Pas
  HTML tag: <input>
  CSS class: slovensko-pas-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9 characters in the format XXNNNNNNN: 2 block letters and 7 digits; valid for 10 years
  Usage:
    <input class="slovensko-pas-input" type="text" aria-label="Slovak Passport" autocomplete="off">
-->

<input
  class="slovensko-pas-input"
  type="text"
  aria-label="Slovak Passport"
  autocomplete="off"
>
