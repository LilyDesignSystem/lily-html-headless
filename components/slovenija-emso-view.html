<!-- SlovenijaEmsoView component -->
<!--
  Description: a read-only display of Slovenia's Enotna Matična Številka Občana (EMŠO)
  HTML tag: <span>
  CSS class: slovenija-emso-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 13 digits: the first 7 are the date of birth (DDMMYYY), digits 8-9 the register, 10-12 a sex-and-serial component (000-499 male, 500-999 female), 13 a check digit
  Usage:
    <span class="slovenija-emso-view" aria-label="Unique Master Citizen Number">value-here</span>
-->

<span
  class="slovenija-emso-view"
  aria-label="Unique Master Citizen Number"
></span>
