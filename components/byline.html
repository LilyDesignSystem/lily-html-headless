<!-- byline.html -->
<!-- Byline component -->
<!--
  Description: an author attribution
  HTML tag: <div>
  CSS class: byline
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<div
  class="byline"
  aria-label=""
>
  <span class="byline-authors">
    <!-- Consumer provides authors -->
  </span>
  <span class="byline-published">
    <!-- Consumer provides <time datetime="..."> -->
  </span>
</div>
