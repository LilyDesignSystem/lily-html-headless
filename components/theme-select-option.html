<!-- ThemeSelectOption component -->
<!--
  Description: one option in a theme select dropdown
  HTML tag: <option> wrapped in <select>
  CSS class: theme-select-option
  Accessibility: aria-label for accessible name
-->

<select><option class="theme-select-option" aria-label="Example">
    <!-- Consumer provides child content -->
</option></select>
