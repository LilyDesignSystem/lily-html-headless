<!-- NederlandBurgerserviceNummerView component -->
<!--
  Description: a read-only display of Netherlands's Burgerservicenummer (BSN)
  HTML tag: <span>
  CSS class: nederland-burgerservice-nummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9-digit number issued via the Personal Records Database (BRP); validated with a variant of the eleven-test (Luhn) algorithm
  Usage:
    <span class="nederland-burgerservice-nummer-view" aria-label="Citizen Service Number">value-here</span>
-->

<span
  class="nederland-burgerservice-nummer-view"
  aria-label="Citizen Service Number"
></span>
