<!-- PortugalPassaporteView component -->
<!--
  Description: a read-only display of Portugal's Passaporte
  HTML tag: <span>
  CSS class: portugal-passaporte-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 1 letter [A-Z] and 6 digits [0-9]
  Usage:
    <span class="portugal-passaporte-view" aria-label="Portuguese Passport">value-here</span>
-->

<span
  class="portugal-passaporte-view"
  aria-label="Portuguese Passport"
></span>
