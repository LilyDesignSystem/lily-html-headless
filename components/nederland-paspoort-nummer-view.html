<!-- NederlandPaspoortNummerView component -->
<!--
  Description: a read-only display of Netherlands's Paspoort Nummer
  HTML tag: <span>
  CSS class: nederland-paspoort-nummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 9 characters: positions 1-2 [A-Z] except 'O', positions 3-8 [A-Z 0-9] except 'O', position 9 [0-9]
  Usage:
    <span class="nederland-paspoort-nummer-view" aria-label="Dutch Passport Number">value-here</span>
-->

<span
  class="nederland-paspoort-nummer-view"
  aria-label="Dutch Passport Number"
></span>
