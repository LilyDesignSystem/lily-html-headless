<!-- VitalSignBellyCircumferenceAsCmInput component -->
<!--
  Description: number input of one vital sign belly circumference in centimetres with integers
  HTML tag: <input>
  CSS class: vital-sign-belly-circumference-as-cm-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-belly-circumference-as-cm-input" type="number" aria-label="Belly circumference (cm)" min="0" max="300" step="1">
-->

<input
  class="vital-sign-belly-circumference-as-cm-input"
  type="number"
  min="0"
  max="300"
  step="1"
  aria-label="Belly Circumference"
>
