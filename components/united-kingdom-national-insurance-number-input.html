<!-- UnitedKingdomNationalInsuranceNumberInput component -->
<!--
  Description: an input for entering United Kingdom's National Insurance Number (NINO)
  HTML tag: <input>
  CSS class: united-kingdom-national-insurance-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: two prefix letters, six digits, and a suffix letter (A, B, C, or D) — e.g. AB123456A; the letters D, F, I, Q, U, V and the prefix-2 letter O are excluded
  Usage:
    <input class="united-kingdom-national-insurance-number-input" type="text" aria-label="National Insurance Number" autocomplete="off">
-->

<input
  class="united-kingdom-national-insurance-number-input"
  type="text"
  aria-label="National Insurance Number"
  autocomplete="off"
>
