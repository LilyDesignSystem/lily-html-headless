<!-- IslandKennitalaView component -->
<!--
  Description: a read-only display of Iceland's Kennitala
  HTML tag: <span>
  CSS class: island-kennitala-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits where the first 6 are the date of birth (DDMMYY)
  Usage:
    <span class="island-kennitala-view" aria-label="Personal Identity Code">value-here</span>
-->

<span
  class="island-kennitala-view"
  aria-label="Personal Identity Code"
></span>
