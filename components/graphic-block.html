<!-- graphic-block.html -->
<!-- GraphicBlock component -->
<!--
  Description: a wrapper for charts and graphics
  HTML tag: <figure>
  CSS class: graphic-block
  Keyboard: None (passive element)
  Accessibility: role="img", aria-label for accessible name
-->

<figure
  class="graphic-block"
  role="img"
  aria-label=""
>
  <figcaption class="graphic-block-caption">
    <!-- Consumer provides title, description, notes -->
  </figcaption>
  <div class="graphic-block-content">
    <!-- Consumer provides chart/graphic -->
  </div>
</figure>
