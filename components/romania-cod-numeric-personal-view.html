<!-- RomaniaCodNumericPersonalView component -->
<!--
  Description: a read-only display of Romania's Cod Numeric Personal (CNP)
  HTML tag: <span>
  CSS class: romania-cod-numeric-personal-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 13 digits: gender and century (1/3/5/7 male; 2/4/6/8 female; 9 foreigner), date of birth (YYMMDD), country zone (01-52, or 99 for Bucharest sectors), serial (3 digits), and a Modulus-11 checksum digit
  Usage:
    <span class="romania-cod-numeric-personal-view" aria-label="Personal Numerical Code">value-here</span>
-->

<span
  class="romania-cod-numeric-personal-view"
  aria-label="Personal Numerical Code"
></span>
