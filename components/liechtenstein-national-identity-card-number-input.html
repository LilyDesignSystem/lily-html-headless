<!-- LiechtensteinNationalIdentityCardNumberInput component -->
<!--
  Description: an input for entering Liechtenstein's Liechtenstein National Identity Card Number
  HTML tag: <input>
  CSS class: liechtenstein-national-identity-card-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 2 letters followed by 8 digits (e.g. ID022143586); changes with each renewed card
  Usage:
    <input class="liechtenstein-national-identity-card-number-input" type="text" aria-label="Liechtenstein National Identity Card Number" autocomplete="off">
-->

<input
  class="liechtenstein-national-identity-card-number-input"
  type="text"
  aria-label="Liechtenstein National Identity Card Number"
  autocomplete="off"
>
