<!-- UnitedKingdomNationalInsuranceNumberView component -->
<!--
  Description: a read-only display of United Kingdom's National Insurance Number (NINO)
  HTML tag: <span>
  CSS class: united-kingdom-national-insurance-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: two prefix letters, six digits, and a suffix letter (A, B, C, or D) — e.g. AB123456A; the letters D, F, I, Q, U, V and the prefix-2 letter O are excluded
  Usage:
    <span class="united-kingdom-national-insurance-number-view" aria-label="National Insurance Number">value-here</span>
-->

<span
  class="united-kingdom-national-insurance-number-view"
  aria-label="National Insurance Number"
></span>
