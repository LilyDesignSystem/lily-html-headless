<!-- CeskoRodneCisloInput component -->
<!--
  Description: an input for entering Czech Republic's Rodné číslo (RČ)
  HTML tag: <input>
  CSS class: cesko-rodne-cislo-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: nine or ten digits in the format YYXXDD/SSSC where XX=MM for males and MM+50 for females; the ten-digit form ends in a check digit and is usually divisible by 11
  Usage:
    <input class="cesko-rodne-cislo-input" type="text" aria-label="Czech Personal Number" autocomplete="off">
-->

<input
  class="cesko-rodne-cislo-input"
  type="text"
  aria-label="Czech Personal Number"
  autocomplete="off"
>
