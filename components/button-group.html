<!-- button-group.html -->
<!-- ButtonGroup component -->
<!--
  Description: a wrapper that groups related buttons together

  HTML tag: <div>
  CSS class: button-group
  Keyboard: None directly (focus moves through inner buttons via Tab)
  Accessibility: role="group" plus a required aria-label provides an accessible name for the group of related buttons.

  Usage:
    <div class="button-group" role="group" aria-label="Form actions">
      <button type="button">Save</button>
      <button type="button">Cancel</button>
    </div>
-->

<div
  class="button-group"
  role="group"
  aria-label=""
>
  <!-- Consumer provides related <button> elements as children -->
</div>
