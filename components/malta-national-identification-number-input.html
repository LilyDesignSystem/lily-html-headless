<!-- MaltaNationalIdentificationNumberInput component -->
<!--
  Description: an input for entering Malta's Malta National Identification Number
  HTML tag: <input>
  CSS class: malta-national-identification-number-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 8 characters: 7 digits and a letter (A, B, G, H, L, M, P, or Z) that encodes geographic origin and registration era
  Usage:
    <input class="malta-national-identification-number-input" type="text" aria-label="Malta National Identification Number" autocomplete="off">
-->

<input
  class="malta-national-identification-number-input"
  type="text"
  aria-label="Malta National Identification Number"
  autocomplete="off"
>
