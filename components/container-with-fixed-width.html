<!-- container-with-fixed-width.html -->
<!-- ContainerWithFixedWidth component -->
<!--
  Description: a centered content wrapper with a fixed max-width breakpoint

  HTML tag: <div>
  CSS class: container-with-fixed-width
  Keyboard: None (passive element)
  Accessibility: None — purely structural layout container

  Behavior:
    Inline style applies max-width and margin-inline: auto so the container
    is centered horizontally within its parent. The data-max-width attribute
    is exposed for consumer CSS hooks.

  Usage:
    <div class="container-with-fixed-width" data-max-width="1200px"
         style="max-width: 1200px; margin-inline: auto;">
      ...
    </div>
-->

<div
  class="container-with-fixed-width"
  data-max-width="1200px"
  style="max-width: 1200px; margin-inline: auto;"
>
  <!-- Consumer provides centered content -->
</div>
