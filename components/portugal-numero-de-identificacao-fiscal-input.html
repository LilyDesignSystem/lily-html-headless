<!-- PortugalNumeroDeIdentificacaoFiscalInput component -->
<!--
  Description: an input for entering Portugal's Número de Identificação Fiscal (NIF)
  HTML tag: <input>
  CSS class: portugal-numero-de-identificacao-fiscal-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9 digits; the leading digit(s) encode the kind of taxpayer (1-3 personal, 45 non-resident citizen, 5 legal person, etc.)
  Usage:
    <input class="portugal-numero-de-identificacao-fiscal-input" type="text" aria-label="Tax Identification Number" autocomplete="off">
-->

<input
  class="portugal-numero-de-identificacao-fiscal-input"
  type="text"
  aria-label="Tax Identification Number"
  autocomplete="off"
>
