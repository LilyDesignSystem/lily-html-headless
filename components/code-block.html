<!-- CodeBlock component -->
<!--
  Description: a block of formatted code
  HTML tag: <pre>
  CSS class: code-block
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<pre
  class="code-block"
  aria-label=""
>
<code><!-- Consumer provides code --></code>
</pre>
