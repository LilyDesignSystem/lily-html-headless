<!-- VitalSignBellyCircumferenceAsCmView component -->
<!--
  Description: number display of one vital sign belly circumference in centimetres with integers
  HTML tag: <span>
  CSS class: vital-sign-belly-circumference-as-cm-view
  Keyboard: None (passive element)
  Accessibility: role="img", aria-label for accessible name
  Usage:
    <span class="vital-sign-belly-circumference-as-cm-view" role="img" aria-label="90 cm belly circumference" data-value="90">90</span>
-->

<span
  class="vital-sign-belly-circumference-as-cm-view"
  role="img"
  aria-label="Belly Circumference"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
