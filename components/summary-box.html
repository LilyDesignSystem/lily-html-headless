<!-- summary-box.html -->
<!-- SummaryBox component -->
<!--
  Description: a boxed callout highlighting key takeaways or next steps from a longer page

  HTML tag: <aside>
  CSS class: summary-box
  Keyboard: None (passive container; inner focusable elements behave normally)
  Accessibility:
    - <aside> provides a complementary landmark
    - aria-label gives the region an accessible name (defaults to the heading text)

  Usage:
    <aside class="summary-box" aria-label="Key takeaways">
      <h3 class="summary-box-heading">Key takeaways</h3>
      <div class="summary-box-body">
        <ul>…</ul>
      </div>
    </aside>
-->

<aside
  class="summary-box"
  aria-label=""
>
  <h3 class="summary-box-heading">
    <!-- Consumer-provided heading text -->
  </h3>
  <div class="summary-box-body">
    <!-- Consumer-provided body content -->
  </div>
</aside>
