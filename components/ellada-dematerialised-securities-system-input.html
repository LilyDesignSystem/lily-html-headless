<!-- ElladaDematerialisedSecuritiesSystemInput component -->
<!--
  Description: an input for entering Greece's Dematerialised Securities System (DSS)
  HTML tag: <input>
  CSS class: ellada-dematerialised-securities-system-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 10 digits linked to the investor's personal details (name, ID number, passport number, tax registration number) and managed by the Central Securities Depository of Greece
  Usage:
    <input class="ellada-dematerialised-securities-system-input" type="text" aria-label="Dematerialised Securities System" autocomplete="off">
-->

<input
  class="ellada-dematerialised-securities-system-input"
  type="text"
  aria-label="Dematerialised Securities System"
  autocomplete="off"
>
