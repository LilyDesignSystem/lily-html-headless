<!-- NederlandIdentiteitskaartNummerInput component -->
<!--
  Description: an input for entering Netherlands's Identiteitskaart Nummer
  HTML tag: <input>
  CSS class: nederland-identiteitskaart-nummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9 characters following the same format as the passport number; 'O' is disallowed but '0' is permitted
  Usage:
    <input class="nederland-identiteitskaart-nummer-input" type="text" aria-label="Dutch National Identity Card Number" autocomplete="off">
-->

<input
  class="nederland-identiteitskaart-nummer-input"
  type="text"
  aria-label="Dutch National Identity Card Number"
  autocomplete="off"
>
