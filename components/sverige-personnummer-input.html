<!-- sverige-personnummer-input.html -->
<!-- SverigePersonnummerInput component -->
<!--
  Description: an input for entering Sweden's Personnummer
  HTML tag: <input>
  CSS class: sverige-personnummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 12 digits in the format CCYYMMDDZZZQ: CCYYMMDD is the date of birth, ZZZ a serial (odd male, even female), and Q a Luhn check digit
  Usage:
    <input class="sverige-personnummer-input" type="text" aria-label="Personal Identity Number" autocomplete="off">
-->

<input
  class="sverige-personnummer-input"
  type="text"
  aria-label="Personal Identity Number"
  autocomplete="off"
>
