<!-- slider-button.html -->
<!-- SliderButton component -->
<!--
  Description: a button with a slider
  HTML tag: <button>
  CSS class: slider-button
  Keyboard: Tab to focus, Enter/Space to activate
  Accessibility: role="slider", aria-label for accessible name
-->

<button
  class="slider-button"
  role="slider"
  aria-label=""
  type="button"
  aria-valuemin="0"
  aria-valuemax="100"
  aria-valuenow="0"
>
  <!-- Consumer provides content -->
</button>
