<!-- LietuvaAsmensKodasInput component -->
<!--
  Description: an input for entering Lithuania's Asmens kodas
  HTML tag: <input>
  CSS class: lietuva-asmens-kodas-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 digits in the format GYYMMDDNNNC: G encodes sex and century (4 or 6 women, 3 or 5 men), YYMMDD is the date of birth, NNN is a serial, C is the check digit
  Usage:
    <input class="lietuva-asmens-kodas-input" type="text" aria-label="Personal Code" autocomplete="off">
-->

<input
  class="lietuva-asmens-kodas-input"
  type="text"
  aria-label="Personal Code"
  autocomplete="off"
>
