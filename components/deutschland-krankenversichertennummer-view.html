<!-- DeutschlandKrankenversichertennummerView component -->
<!--
  Description: a read-only display of Germany's Krankenversichertennummer (KVNR)
  HTML tag: <span>
  CSS class: deutschland-krankenversichertennummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: a random capital letter followed by eight random digits and a Luhn check digit
  Usage:
    <span class="deutschland-krankenversichertennummer-view" aria-label="Health Insurance Number">value-here</span>
-->

<span
  class="deutschland-krankenversichertennummer-view"
  aria-label="Health Insurance Number"
></span>
