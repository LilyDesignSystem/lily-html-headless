<!-- CeskoRodneCisloView component -->
<!--
  Description: a read-only display of Czech Republic's Rodné číslo (RČ)
  HTML tag: <span>
  CSS class: cesko-rodne-cislo-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: nine or ten digits in the format YYXXDD/SSSC where XX=MM for males and MM+50 for females; the ten-digit form ends in a check digit and is usually divisible by 11
  Usage:
    <span class="cesko-rodne-cislo-view" aria-label="Czech Personal Number">value-here</span>
-->

<span
  class="cesko-rodne-cislo-view"
  aria-label="Czech Personal Number"
></span>
