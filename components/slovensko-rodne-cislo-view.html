<!-- SlovenskoRodneCisloView component -->
<!--
  Description: a read-only display of Slovakia's Rodné číslo (RČ)
  HTML tag: <span>
  CSS class: slovensko-rodne-cislo-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits in the form YYMMDDCCCX where MM is 01-12 for males and 51-62 for females; X is a check digit and the whole number is divisible by 11
  Usage:
    <span class="slovensko-rodne-cislo-view" aria-label="Slovak Personal Number">value-here</span>
-->

<span
  class="slovensko-rodne-cislo-view"
  aria-label="Slovak Personal Number"
></span>
