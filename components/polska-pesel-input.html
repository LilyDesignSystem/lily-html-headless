<!-- polska-pesel-input.html -->
<!-- PolskaPeselInput component -->
<!--
  Description: an input for entering Poland's PESEL
  HTML tag: <input>
  CSS class: polska-pesel-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 numeric digits; assigned shortly after birth and unchanged for life
  Usage:
    <input class="polska-pesel-input" type="text" aria-label="PESEL" autocomplete="off">
-->

<input
  class="polska-pesel-input"
  type="text"
  aria-label="PESEL"
  autocomplete="off"
>
