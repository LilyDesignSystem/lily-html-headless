<!-- feature-photo.html -->
<!-- FeaturePhoto component -->
<!--
  Description: a responsive photo with caption and credit
  HTML tag: <figure>
  CSS class: feature-photo
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
-->

<figure
  class="feature-photo"
  aria-label=""
>
  <img class="feature-photo-image" src="" alt="" loading="lazy">
  <figcaption class="feature-photo-caption">
    <!-- Consumer provides caption + credit -->
  </figcaption>
</figure>
