<!-- MaltaPassportNumberView component -->
<!--
  Description: a read-only display of Malta's Malta Passport Number
  HTML tag: <span>
  CSS class: malta-passport-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 7 numerical digits issued by the Civil Registration Directorate
  Usage:
    <span class="malta-passport-number-view" aria-label="Malta Passport Number">value-here</span>
-->

<span
  class="malta-passport-number-view"
  aria-label="Malta Passport Number"
></span>
