<!-- icon-list.html -->
<!-- IconList component -->
<!--
  Description: an ordered list of icon list item components

  HTML tag: <ul>
  CSS class: icon-list
  Keyboard: None (passive list; inner focusable elements behave normally)
  Accessibility: The native <ul> conveys list semantics. An optional aria-label provides an accessible name for the list.

  Usage:
    <ul class="icon-list" aria-label="Benefits">
      <li class="icon-list-item">…</li>
      <li class="icon-list-item">…</li>
    </ul>
-->

<ul
  class="icon-list"
  aria-label=""
>
  <!-- Consumer provides <li class="icon-list-item"> children -->
</ul>
