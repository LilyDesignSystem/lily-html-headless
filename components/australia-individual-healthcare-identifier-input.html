<!-- AustraliaIndividualHealthcareIdentifierInput component -->
<!--
  Description: an input for entering Australia's Individual Healthcare Identifier (IHI)
  HTML tag: <input>
  CSS class: australia-individual-healthcare-identifier-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 16 digits assigned by the Healthcare Identifiers Service
  Usage:
    <input class="australia-individual-healthcare-identifier-input" type="text" aria-label="Individual Healthcare Identifier" autocomplete="off">
-->

<input
  class="australia-individual-healthcare-identifier-input"
  type="text"
  aria-label="Individual Healthcare Identifier"
  autocomplete="off"
>
