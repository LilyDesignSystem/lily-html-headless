<!-- LietuvaPasasView component -->
<!--
  Description: a read-only display of Lithuania's Pasas
  HTML tag: <span>
  CSS class: lietuva-pasas-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 8-digit passport or identity card number
  Usage:
    <span class="lietuva-pasas-view" aria-label="Lithuanian Passport">value-here</span>
-->

<span
  class="lietuva-pasas-view"
  aria-label="Lithuanian Passport"
></span>
