<!-- NederlandBurgerserviceNummerInput component -->
<!--
  Description: an input for entering Netherlands's Burgerservicenummer (BSN)
  HTML tag: <input>
  CSS class: nederland-burgerservice-nummer-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 9-digit number issued via the Personal Records Database (BRP); validated with a variant of the eleven-test (Luhn) algorithm
  Usage:
    <input class="nederland-burgerservice-nummer-input" type="text" aria-label="Citizen Service Number" autocomplete="off">
-->

<input
  class="nederland-burgerservice-nummer-input"
  type="text"
  aria-label="Citizen Service Number"
  autocomplete="off"
>
