<!-- LietuvaAsmensKodasView component -->
<!--
  Description: a read-only display of Lithuania's Asmens kodas
  HTML tag: <span>
  CSS class: lietuva-asmens-kodas-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 digits in the format GYYMMDDNNNC: G encodes sex and century (4 or 6 women, 3 or 5 men), YYMMDD is the date of birth, NNN is a serial, C is the check digit
  Usage:
    <span class="lietuva-asmens-kodas-view" aria-label="Personal Code">value-here</span>
-->

<span
  class="lietuva-asmens-kodas-view"
  aria-label="Personal Code"
></span>
