<!-- PolskaPeselView component -->
<!--
  Description: a read-only display of Poland's PESEL
  HTML tag: <span>
  CSS class: polska-pesel-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 11 numeric digits; assigned shortly after birth and unchanged for life
  Usage:
    <span class="polska-pesel-view" aria-label="PESEL">value-here</span>
-->

<span
  class="polska-pesel-view"
  aria-label="PESEL"
></span>
