<!-- action-bar-button.html -->
<!-- ActionBarButton component -->
<!--
  Description: one action button inside an action bar

  HTML tag: <button>
  CSS class: action-bar-button
  Keyboard: Tab to focus, Enter or Space to activate (native <button> behavior)
  Accessibility: aria-label is REQUIRED for accessible name; disabled state honored
                 by the browser. Sits inside an action-bar (role="toolbar").

  Usage:
    <button class="action-bar-button" type="button" aria-label="Delete">
      <svg>...</svg>
    </button>
-->

<button
  class="action-bar-button"
  type="button"
  aria-label=""
>
  <!-- Consumer provides icon and/or text content -->
</button>
