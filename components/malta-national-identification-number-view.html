<!-- MaltaNationalIdentificationNumberView component -->
<!--
  Description: a read-only display of Malta's Malta National Identification Number
  HTML tag: <span>
  CSS class: malta-national-identification-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 8 characters: 7 digits and a letter (A, B, G, H, L, M, P, or Z) that encodes geographic origin and registration era
  Usage:
    <span class="malta-national-identification-number-view" aria-label="Malta National Identification Number">value-here</span>
-->

<span
  class="malta-national-identification-number-view"
  aria-label="Malta National Identification Number"
></span>
