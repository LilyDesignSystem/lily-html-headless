<!-- SuomiHenkilotunnusInput component -->
<!--
  Description: an input for entering Finland's Henkilötunnus (HETU)
  HTML tag: <input>
  CSS class: suomi-henkilotunnus-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Format: 11 characters in the format DDMMYYCZZZQ: DDMMYY is the date of birth, C is the century sign (+, -, or A), ZZZ is an individual number (odd male, even female), Q is the checksum
  Usage:
    <input class="suomi-henkilotunnus-input" type="text" aria-label="Personal Identity Code" autocomplete="off">
-->

<input
  class="suomi-henkilotunnus-input"
  type="text"
  aria-label="Personal Identity Code"
  autocomplete="off"
>
