<!-- DanmarkPersonnummerView component -->
<!--
  Description: a read-only display of Denmark's Personnummer (CPR-nummer) (CPR)
  HTML tag: <span>
  CSS class: danmark-personnummer-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits in the format DDMMYYXXXX where the first 6 are the date of birth (DDMMYY)
  Usage:
    <span class="danmark-personnummer-view" aria-label="Personal Identity Code">value-here</span>
-->

<span
  class="danmark-personnummer-view"
  aria-label="Personal Identity Code"
></span>
