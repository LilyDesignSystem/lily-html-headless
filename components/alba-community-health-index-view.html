<!-- AlbaCommunityHealthIndexView component -->
<!--
  Description: a read-only display of Scotland's Community Health Index (CHI)
  HTML tag: <span>
  CSS class: alba-community-health-index-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: 10 digits encoding date of birth (DDMMYY) + two random digits + a sex digit (odd male, even female) + a Modulus-11 check digit
  Usage:
    <span class="alba-community-health-index-view" aria-label="Community Health Index">value-here</span>
-->

<span
  class="alba-community-health-index-view"
  aria-label="Community Health Index"
></span>
