<!-- table-col.html -->
<!-- TableTD component -->
<!--
  Description: a table column header cell
  HTML tag: <th>
  CSS class: table-col
  Keyboard: None (passive element)
  Accessibility: scope="col" associates the header with its column
  Usage:
    <thead>
      <tr>
        <th class="table-col" scope="col">Name</th>
      </tr>
    </thead>
-->

<th
  class="table-col"
  scope="col"
>
  <!-- Consumer provides header text -->
</th>
