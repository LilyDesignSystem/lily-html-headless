<!-- CyprusNationalPassportNumberView component -->
<!--
  Description: a read-only display of Cyprus's National Passport Number
  HTML tag: <span>
  CSS class: cyprus-national-passport-number-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Format: passports before 13/12/2010 begin with 'E' followed by 6 digits (e.g. E123456); biometric passports issued after 13/12/2010 begin with 'K' followed by 8 digits (e.g. K12345678)
  Usage:
    <span class="cyprus-national-passport-number-view" aria-label="National Passport Number">value-here</span>
-->

<span
  class="cyprus-national-passport-number-view"
  aria-label="National Passport Number"
></span>
